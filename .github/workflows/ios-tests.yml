name: iOS Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Test
        run: |
          xcodebuild test \
          -workspace "Guía TV.xcworkspace" \
          -scheme "Guía TV" \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro" \
          CODE_SIGNING_ALLOWED=NO
