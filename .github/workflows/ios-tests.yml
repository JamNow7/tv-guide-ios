name: iOS Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Test
        run: |
          xcodebuild test \
          -project "Guía TV.xcodeproj" \
          -scheme "GuiaTV" \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
          CODE_SIGNING_ALLOWED=NO
